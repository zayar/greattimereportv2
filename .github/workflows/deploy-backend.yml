name: Deploy Backend to Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.ARTIFACT_REGISTRY_REGION }}-docker.pkg.dev --quiet

      - name: Build backend image
        env:
          IMAGE_URI: ${{ vars.ARTIFACT_REGISTRY_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.ARTIFACT_REGISTRY_REPOSITORY }}/${{ vars.CLOUD_RUN_SERVICE }}:${{ github.sha }}
        run: |
          BUILD_OUTPUT="$(gcloud builds submit \
            --async \
            --format=json \
            --config cloudbuild.backend.yaml \
            --substitutions=_IMAGE_URI="$IMAGE_URI" \
            .)"

          BUILD_ID="$(BUILD_OUTPUT="$BUILD_OUTPUT" python - <<'PY'
          import json
          import os

          data = json.loads(os.environ["BUILD_OUTPUT"])
          build_id = data.get("id")

          if not build_id:
            metadata = data.get("metadata") or {}
            build = metadata.get("build") or {}
            build_id = build.get("id")

          if not build_id:
            name = data.get("name")
            if isinstance(name, str) and "/" in name:
              build_id = name.rsplit("/", 1)[-1]

          if not build_id:
            raise SystemExit("Could not determine Cloud Build ID from submit output.")

          print(build_id)
          PY
          )"

          echo "Started Cloud Build: $BUILD_ID"

          while true; do
            STATUS="$(gcloud builds describe "$BUILD_ID" --format='value(status)')"
            echo "Cloud Build status: $STATUS"

            case "$STATUS" in
              SUCCESS)
                break
                ;;
              FAILURE|INTERNAL_ERROR|TIMEOUT|CANCELLED|EXPIRED)
                echo "Cloud Build failed with status: $STATUS"
                exit 1
                ;;
              *)
                sleep 15
                ;;
            esac
          done

      - name: Generate Cloud Run env file
        env:
          APICORE_GRAPHQL_URL: ${{ vars.APICORE_GRAPHQL_URL }}
          APICORE_SERVICE_USERNAME: ${{ vars.APICORE_SERVICE_USERNAME }}
          CORS_ORIGIN: ${{ vars.CORS_ORIGIN }}
          AI_PROVIDER: ${{ vars.AI_PROVIDER }}
          AI_DEFAULT_LANGUAGE: ${{ vars.AI_DEFAULT_LANGUAGE }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          GEMINI_API_BASE_URL: ${{ vars.GEMINI_API_BASE_URL }}
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          DEFAULT_TIMEZONE: ${{ vars.DEFAULT_TIMEZONE }}
          BQ_PROJECT_ID: ${{ vars.BQ_PROJECT_ID }}
          BQ_DATASET: ${{ vars.BQ_DATASET }}
          BQ_LOCATION: ${{ vars.BQ_LOCATION }}
          BQ_MAIN_DATA_VIEW: ${{ vars.BQ_MAIN_DATA_VIEW }}
          BQ_MAIN_PAYMENT_VIEW: ${{ vars.BQ_MAIN_PAYMENT_VIEW }}
          GT_GROWTH_AI_DEFAULT_ENABLED: ${{ vars.GT_GROWTH_AI_DEFAULT_ENABLED }}
          GT_GROWTH_AI_ENABLED_CLINIC_IDS: ${{ vars.GT_GROWTH_AI_ENABLED_CLINIC_IDS }}
          GT_GROWTH_AI_FEATURE_STORE_ENABLED: ${{ vars.GT_GROWTH_AI_FEATURE_STORE_ENABLED }}
          GT_GROWTH_AI_ADMIN_EMAILS: ${{ vars.GT_GROWTH_AI_ADMIN_EMAILS }}
          AI_AGENT_MONITORING_ADMIN_EMAILS: ${{ vars.AI_AGENT_MONITORING_ADMIN_EMAILS }}
          TELEGRAM_BOT_USERNAME: ${{ vars.TELEGRAM_BOT_USERNAME }}
          TELEGRAM_LINK_CODE_TTL_MINUTES: ${{ vars.TELEGRAM_LINK_CODE_TTL_MINUTES }}
          TELEGRAM_REPORT_DEFAULT_TIME: ${{ vars.TELEGRAM_REPORT_DEFAULT_TIME }}
          TELEGRAM_API_TIMEOUT_MS: ${{ vars.TELEGRAM_API_TIMEOUT_MS }}
          TELEGRAM_SCHEDULER_ENABLED: ${{ vars.TELEGRAM_SCHEDULER_ENABLED }}
          TELEGRAM_SCHEDULER_INTERVAL_MS: ${{ vars.TELEGRAM_SCHEDULER_INTERVAL_MS }}
          TELEGRAM_SCHEDULER_BUSY_TIMEOUT_MS: ${{ vars.TELEGRAM_SCHEDULER_BUSY_TIMEOUT_MS }}
          TELEGRAM_WEBHOOK_ENABLED: ${{ vars.TELEGRAM_WEBHOOK_ENABLED }}
          TELEGRAM_WEBHOOK_WATCHDOG_ENABLED: ${{ vars.TELEGRAM_WEBHOOK_WATCHDOG_ENABLED }}
          TELEGRAM_WEBHOOK_WATCHDOG_INTERVAL_MS: ${{ vars.TELEGRAM_WEBHOOK_WATCHDOG_INTERVAL_MS }}
          TELEGRAM_POLLING_ENABLED: ${{ vars.TELEGRAM_POLLING_ENABLED }}
          TELEGRAM_POLLING_INTERVAL_MS: ${{ vars.TELEGRAM_POLLING_INTERVAL_MS }}
          SHOW_FULL_CUSTOMER_PHONE: ${{ vars.SHOW_FULL_CUSTOMER_PHONE }}
          MASK_PHONE_IN_GROUP_CHAT: ${{ vars.MASK_PHONE_IN_GROUP_CHAT }}
          APPOINTMENT_BUTTON_PHONE_SUFFIX_DIGITS: ${{ vars.APPOINTMENT_BUTTON_PHONE_SUFFIX_DIGITS }}
          MAX_APPOINTMENT_BUTTONS_PER_PAGE: ${{ vars.MAX_APPOINTMENT_BUTTONS_PER_PAGE }}
          APICORE_REQUEST_TIMEOUT_MS: ${{ vars.APICORE_REQUEST_TIMEOUT_MS }}
          FIREBASE_AUTH_REQUEST_TIMEOUT_MS: ${{ vars.FIREBASE_AUTH_REQUEST_TIMEOUT_MS }}
          AGENT_MEMORY_V2_ENABLED: ${{ vars.AGENT_MEMORY_V2_ENABLED }}
          AGENT_LEARNING_ENABLED: ${{ vars.AGENT_LEARNING_ENABLED }}
          AGENT_LEARNING_DEFAULT_LOOKBACK_DAYS: ${{ vars.AGENT_LEARNING_DEFAULT_LOOKBACK_DAYS }}
          AGENT_STALE_THRESHOLD_HOURS: ${{ vars.AGENT_STALE_THRESHOLD_HOURS }}
          AGENT_LEARNING_SCHEDULER_JOB_NAME: ${{ vars.AGENT_LEARNING_SCHEDULER_JOB_NAME }}
          AGENT_LEARNING_SCHEDULER_CRON: ${{ vars.AGENT_LEARNING_SCHEDULER_CRON }}
          AGENT_LEARNING_SCHEDULER_TIME_ZONE: ${{ vars.AGENT_LEARNING_SCHEDULER_TIME_ZONE }}
          AGENT_OPERATIONAL_SNAPSHOT_INTERVAL_MINUTES: ${{ vars.AGENT_OPERATIONAL_SNAPSHOT_INTERVAL_MINUTES }}
          AGENT_LEARNING_MAX_CLINIC_CONCURRENCY: ${{ vars.AGENT_LEARNING_MAX_CLINIC_CONCURRENCY }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_WEB_API_KEY: ${{ secrets.FIREBASE_WEB_API_KEY }}
          APICORE_SERVICE_PASSWORD: ${{ secrets.APICORE_SERVICE_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_SCHEDULER_SECRET: ${{ secrets.TELEGRAM_SCHEDULER_SECRET }}
          TELEGRAM_WEBHOOK_SECRET: ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
          AGENT_LEARNING_SCHEDULER_SECRET: ${{ secrets.AGENT_LEARNING_SCHEDULER_SECRET }}
        run: |
          node <<'NODE'
          const fs = require("node:fs");

          const requiredEnv = {
            CORS_ORIGIN: process.env.CORS_ORIGIN,
            APICORE_GRAPHQL_URL: process.env.APICORE_GRAPHQL_URL,
            FIREBASE_SERVICE_ACCOUNT_JSON: process.env.FIREBASE_SERVICE_ACCOUNT_JSON,
            BQ_PROJECT_ID: process.env.BQ_PROJECT_ID,
            BQ_DATASET: process.env.BQ_DATASET,
            BQ_LOCATION: process.env.BQ_LOCATION,
            BQ_MAIN_DATA_VIEW: process.env.BQ_MAIN_DATA_VIEW,
            BQ_MAIN_PAYMENT_VIEW: process.env.BQ_MAIN_PAYMENT_VIEW,
          };

          const optionalEnv = {
            AI_PROVIDER: process.env.AI_PROVIDER,
            AI_DEFAULT_LANGUAGE: process.env.AI_DEFAULT_LANGUAGE,
            GEMINI_MODEL: process.env.GEMINI_MODEL,
            GEMINI_API_BASE_URL: process.env.GEMINI_API_BASE_URL,
            GEMINI_API_KEY: process.env.GEMINI_API_KEY,
            APICORE_SERVICE_USERNAME: process.env.APICORE_SERVICE_USERNAME,
            APICORE_SERVICE_PASSWORD: process.env.APICORE_SERVICE_PASSWORD,
            APP_BASE_URL: process.env.APP_BASE_URL,
            DEFAULT_TIMEZONE: process.env.DEFAULT_TIMEZONE,
            FIREBASE_WEB_API_KEY: process.env.FIREBASE_WEB_API_KEY,
            GT_GROWTH_AI_DEFAULT_ENABLED: process.env.GT_GROWTH_AI_DEFAULT_ENABLED,
            GT_GROWTH_AI_ENABLED_CLINIC_IDS: process.env.GT_GROWTH_AI_ENABLED_CLINIC_IDS,
            GT_GROWTH_AI_FEATURE_STORE_ENABLED: process.env.GT_GROWTH_AI_FEATURE_STORE_ENABLED,
            GT_GROWTH_AI_ADMIN_EMAILS: process.env.GT_GROWTH_AI_ADMIN_EMAILS,
            AI_AGENT_MONITORING_ADMIN_EMAILS: process.env.AI_AGENT_MONITORING_ADMIN_EMAILS,
            TELEGRAM_BOT_TOKEN: process.env.TELEGRAM_BOT_TOKEN,
            TELEGRAM_BOT_USERNAME: process.env.TELEGRAM_BOT_USERNAME,
            TELEGRAM_LINK_CODE_TTL_MINUTES: process.env.TELEGRAM_LINK_CODE_TTL_MINUTES,
            TELEGRAM_REPORT_DEFAULT_TIME: process.env.TELEGRAM_REPORT_DEFAULT_TIME,
            TELEGRAM_API_TIMEOUT_MS: process.env.TELEGRAM_API_TIMEOUT_MS,
            TELEGRAM_SCHEDULER_ENABLED: process.env.TELEGRAM_SCHEDULER_ENABLED,
            TELEGRAM_SCHEDULER_INTERVAL_MS: process.env.TELEGRAM_SCHEDULER_INTERVAL_MS,
            TELEGRAM_SCHEDULER_BUSY_TIMEOUT_MS: process.env.TELEGRAM_SCHEDULER_BUSY_TIMEOUT_MS,
            TELEGRAM_SCHEDULER_SECRET: process.env.TELEGRAM_SCHEDULER_SECRET,
            TELEGRAM_WEBHOOK_ENABLED: process.env.TELEGRAM_WEBHOOK_ENABLED,
            TELEGRAM_WEBHOOK_SECRET: process.env.TELEGRAM_WEBHOOK_SECRET,
            TELEGRAM_WEBHOOK_WATCHDOG_ENABLED: process.env.TELEGRAM_WEBHOOK_WATCHDOG_ENABLED,
            TELEGRAM_WEBHOOK_WATCHDOG_INTERVAL_MS: process.env.TELEGRAM_WEBHOOK_WATCHDOG_INTERVAL_MS,
            TELEGRAM_POLLING_ENABLED: process.env.TELEGRAM_POLLING_ENABLED,
            TELEGRAM_POLLING_INTERVAL_MS: process.env.TELEGRAM_POLLING_INTERVAL_MS,
            SHOW_FULL_CUSTOMER_PHONE: process.env.SHOW_FULL_CUSTOMER_PHONE,
            MASK_PHONE_IN_GROUP_CHAT: process.env.MASK_PHONE_IN_GROUP_CHAT,
            APPOINTMENT_BUTTON_PHONE_SUFFIX_DIGITS: process.env.APPOINTMENT_BUTTON_PHONE_SUFFIX_DIGITS,
            MAX_APPOINTMENT_BUTTONS_PER_PAGE: process.env.MAX_APPOINTMENT_BUTTONS_PER_PAGE,
            APICORE_REQUEST_TIMEOUT_MS: process.env.APICORE_REQUEST_TIMEOUT_MS,
            FIREBASE_AUTH_REQUEST_TIMEOUT_MS: process.env.FIREBASE_AUTH_REQUEST_TIMEOUT_MS,
            AGENT_MEMORY_V2_ENABLED: process.env.AGENT_MEMORY_V2_ENABLED,
            AGENT_LEARNING_ENABLED: process.env.AGENT_LEARNING_ENABLED,
            AGENT_LEARNING_SCHEDULER_SECRET: process.env.AGENT_LEARNING_SCHEDULER_SECRET,
            AGENT_LEARNING_DEFAULT_LOOKBACK_DAYS: process.env.AGENT_LEARNING_DEFAULT_LOOKBACK_DAYS,
            AGENT_STALE_THRESHOLD_HOURS: process.env.AGENT_STALE_THRESHOLD_HOURS,
            AGENT_LEARNING_SCHEDULER_JOB_NAME: process.env.AGENT_LEARNING_SCHEDULER_JOB_NAME,
            AGENT_LEARNING_SCHEDULER_CRON: process.env.AGENT_LEARNING_SCHEDULER_CRON,
            AGENT_LEARNING_SCHEDULER_TIME_ZONE: process.env.AGENT_LEARNING_SCHEDULER_TIME_ZONE,
            AGENT_OPERATIONAL_SNAPSHOT_INTERVAL_MINUTES: process.env.AGENT_OPERATIONAL_SNAPSHOT_INTERVAL_MINUTES,
            AGENT_LEARNING_MAX_CLINIC_CONCURRENCY: process.env.AGENT_LEARNING_MAX_CLINIC_CONCURRENCY,
          };

          const env = {
            ...requiredEnv,
            ...Object.fromEntries(
              Object.entries(optionalEnv).filter(([, value]) => Boolean(value))
            ),
          };

          const missing = Object.entries(requiredEnv)
            .filter(([, value]) => !value)
            .map(([key]) => key);

          if (missing.length > 0) {
            throw new Error(`Missing required Cloud Run deploy values: ${missing.join(", ")}`);
          }

          const yaml = Object.entries(env)
            .map(([key, value]) => {
              if (String(value).includes("\n")) {
                const lines = String(value)
                  .split("\n")
                  .map((line) => `  ${line}`)
                  .join("\n");
                return `${key}: |\n${lines}`;
              }

              return `${key}: ${JSON.stringify(String(value))}`;
            })
            .join("\n");

          fs.writeFileSync("cloudrun-env.yaml", `${yaml}\n`);
          NODE

      - name: Deploy to Cloud Run
        env:
          IMAGE_URI: ${{ vars.ARTIFACT_REGISTRY_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.ARTIFACT_REGISTRY_REPOSITORY }}/${{ vars.CLOUD_RUN_SERVICE }}:${{ github.sha }}
          CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT: ${{ vars.CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT }}
          CLOUD_RUN_MEMORY: ${{ vars.CLOUD_RUN_MEMORY }}
          CLOUD_RUN_CPU: ${{ vars.CLOUD_RUN_CPU }}
          CLOUD_RUN_MIN_INSTANCES: ${{ vars.CLOUD_RUN_MIN_INSTANCES }}
          CLOUD_RUN_MAX_INSTANCES: ${{ vars.CLOUD_RUN_MAX_INSTANCES }}
        run: |
          EXTRA_FLAGS=()

          if [ -n "$CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT" ]; then
            EXTRA_FLAGS+=(--service-account "$CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT")
          fi

          if [ -n "$CLOUD_RUN_MEMORY" ]; then
            EXTRA_FLAGS+=(--memory "$CLOUD_RUN_MEMORY")
          fi

          if [ -n "$CLOUD_RUN_CPU" ]; then
            EXTRA_FLAGS+=(--cpu "$CLOUD_RUN_CPU")
          fi

          if [ -n "$CLOUD_RUN_MIN_INSTANCES" ]; then
            EXTRA_FLAGS+=(--min-instances "$CLOUD_RUN_MIN_INSTANCES")
          fi

          if [ -n "$CLOUD_RUN_MAX_INSTANCES" ]; then
            EXTRA_FLAGS+=(--max-instances "$CLOUD_RUN_MAX_INSTANCES")
          fi

          gcloud run deploy "${{ vars.CLOUD_RUN_SERVICE }}" \
            --image "$IMAGE_URI" \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --region "${{ vars.CLOUD_RUN_REGION }}" \
            --platform managed \
            --allow-unauthenticated \
            --env-vars-file cloudrun-env.yaml \
            --quiet \
            "${EXTRA_FLAGS[@]}"

      - name: Upsert Telegram Cloud Scheduler job
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          CLOUD_RUN_REGION: ${{ vars.CLOUD_RUN_REGION }}
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          TELEGRAM_SCHEDULER_SECRET: ${{ secrets.TELEGRAM_SCHEDULER_SECRET }}
          TELEGRAM_SCHEDULER_JOB_NAME: ${{ vars.TELEGRAM_SCHEDULER_JOB_NAME }}
          TELEGRAM_SCHEDULER_CRON: ${{ vars.TELEGRAM_SCHEDULER_CRON }}
          TELEGRAM_SCHEDULER_TIME_ZONE: ${{ vars.TELEGRAM_SCHEDULER_TIME_ZONE }}
        run: |
          if [ -z "$APP_BASE_URL" ] || [ -z "$TELEGRAM_SCHEDULER_SECRET" ]; then
            echo "Skipping Telegram Cloud Scheduler job because APP_BASE_URL or TELEGRAM_SCHEDULER_SECRET is not configured."
            exit 0
          fi

          JOB_NAME="${TELEGRAM_SCHEDULER_JOB_NAME:-gt-v2report-telegram-scheduler}"
          JOB_SCHEDULE="${TELEGRAM_SCHEDULER_CRON:-*/30 * * * *}"
          JOB_TIME_ZONE="${TELEGRAM_SCHEDULER_TIME_ZONE:-Etc/UTC}"
          SCHEDULER_URI="${APP_BASE_URL%/}/api/integrations/telegram/scheduler/run"
          echo "Using Telegram Cloud Scheduler schedule: ${JOB_SCHEDULE} (${JOB_TIME_ZONE})"

          if gcloud scheduler jobs describe "$JOB_NAME" \
            --project "$GCP_PROJECT_ID" \
            --location "$CLOUD_RUN_REGION" >/dev/null 2>&1; then
            gcloud scheduler jobs update http "$JOB_NAME" \
              --project "$GCP_PROJECT_ID" \
              --location "$CLOUD_RUN_REGION" \
              --schedule="$JOB_SCHEDULE" \
              --time-zone="$JOB_TIME_ZONE" \
              --uri="$SCHEDULER_URI" \
              --http-method=POST \
              --update-headers="x-telegram-scheduler-secret=${TELEGRAM_SCHEDULER_SECRET}" \
              --attempt-deadline=30s \
              --quiet
          else
            gcloud scheduler jobs create http "$JOB_NAME" \
              --project "$GCP_PROJECT_ID" \
              --location "$CLOUD_RUN_REGION" \
              --schedule="$JOB_SCHEDULE" \
              --time-zone="$JOB_TIME_ZONE" \
              --uri="$SCHEDULER_URI" \
              --http-method=POST \
              --headers="x-telegram-scheduler-secret=${TELEGRAM_SCHEDULER_SECRET}" \
              --attempt-deadline=30s \
              --quiet
          fi

      - name: Upsert Agent Learning Cloud Scheduler job
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          CLOUD_RUN_REGION: ${{ vars.CLOUD_RUN_REGION }}
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          AGENT_LEARNING_SCHEDULER_SECRET: ${{ secrets.AGENT_LEARNING_SCHEDULER_SECRET }}
          AGENT_LEARNING_SCHEDULER_JOB_NAME: ${{ vars.AGENT_LEARNING_SCHEDULER_JOB_NAME }}
          AGENT_LEARNING_SCHEDULER_CRON: ${{ vars.AGENT_LEARNING_SCHEDULER_CRON }}
          AGENT_LEARNING_SCHEDULER_TIME_ZONE: ${{ vars.AGENT_LEARNING_SCHEDULER_TIME_ZONE }}
        run: |
          if [ -z "$APP_BASE_URL" ] || [ -z "$AGENT_LEARNING_SCHEDULER_SECRET" ]; then
            echo "Skipping Agent Learning Cloud Scheduler job because APP_BASE_URL or AGENT_LEARNING_SCHEDULER_SECRET is not configured."
            exit 0
          fi

          JOB_NAME="${AGENT_LEARNING_SCHEDULER_JOB_NAME:-gt-v2report-agent-learning-scheduler}"
          JOB_SCHEDULE="${AGENT_LEARNING_SCHEDULER_CRON:-*/15 * * * *}"
          JOB_TIME_ZONE="${AGENT_LEARNING_SCHEDULER_TIME_ZONE:-Asia/Yangon}"
          SCHEDULER_URI="${APP_BASE_URL%/}/api/internal/agent-learning/run-all"
          echo "Using Agent Learning Cloud Scheduler schedule: ${JOB_SCHEDULE} (${JOB_TIME_ZONE})"

          if gcloud scheduler jobs describe "$JOB_NAME" \
            --project "$GCP_PROJECT_ID" \
            --location "$CLOUD_RUN_REGION" >/dev/null 2>&1; then
            gcloud scheduler jobs update http "$JOB_NAME" \
              --project "$GCP_PROJECT_ID" \
              --location "$CLOUD_RUN_REGION" \
              --schedule="$JOB_SCHEDULE" \
              --time-zone="$JOB_TIME_ZONE" \
              --uri="$SCHEDULER_URI" \
              --http-method=POST \
              --update-headers="Content-Type=application/json,x-agent-learning-scheduler-secret=${AGENT_LEARNING_SCHEDULER_SECRET}" \
              --message-body='{}' \
              --attempt-deadline=120s \
              --quiet
          else
            gcloud scheduler jobs create http "$JOB_NAME" \
              --project "$GCP_PROJECT_ID" \
              --location "$CLOUD_RUN_REGION" \
              --schedule="$JOB_SCHEDULE" \
              --time-zone="$JOB_TIME_ZONE" \
              --uri="$SCHEDULER_URI" \
              --http-method=POST \
              --headers="Content-Type=application/json,x-agent-learning-scheduler-secret=${AGENT_LEARNING_SCHEDULER_SECRET}" \
              --message-body='{}' \
              --attempt-deadline=120s \
              --quiet
          fi
